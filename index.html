<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Taproom Signage</title>
<link rel="stylesheet" href="css/variables.css" />
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/draft-board.css" />
<link rel="stylesheet" href="css/iframe-module.css" />
<link rel="stylesheet" href="css/announcements.css" />
<link rel="stylesheet" href="css/events.css" />
</head>
<body class="orientation-landscape">

  <div id="boot-loader" class="boot-loader">
    <div class="boot-loader__spinner"></div>
    <p>Starting up&hellip;</p>
  </div>

  <header id="chrome-bar" class="chrome-bar">
    <div class="chrome-bar__brand">
      <img id="venue-logo" class="chrome-bar__logo" alt="" />
      <span id="venue-name" class="chrome-bar__venue">Taproom</span>
    </div>
    <div id="chrome-clock" class="chrome-bar__clock"></div>
  </header>

  <main id="stage" class="stage"></main>

  <noscript>This display requires JavaScript.</noscript>

  <script type="module" src="js/app.js"></script>
</body>
</html>
